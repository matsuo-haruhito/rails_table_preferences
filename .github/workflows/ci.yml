name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: RSpec, JavaScript syntax, gem build, and package verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run RSpec
        run: bundle exec rspec

      - name: Check JavaScript syntax
        run: node script/check_javascript_syntax.mjs

      - name: Check CI workflow permissions
        run: node script/check_ci_workflow_permissions.mjs

      - name: Build gem package
        run: bundle exec rake build

      - name: Verify gem package contents
        run: bundle exec rake package:verify

  pr_rails_matrix:
    if: github.event_name == 'pull_request'
    name: PR Rails compatibility (${{ matrix.rails }}, Ruby ${{ matrix.ruby-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rails: "7.0"
            gemfile: gemfiles/rails_7_0.gemfile
            ruby-version: "3.1"
          - rails: "7.1"
            gemfile: gemfiles/rails_7_1.gemfile
            ruby-version: "3.2"
          - rails: "7.2"
            gemfile: gemfiles/rails_7_2.gemfile
            ruby-version: "3.2"
          - rails: "8.0"
            gemfile: gemfiles/rails_8_0.gemfile
            ruby-version: "3.3"
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run representative Rails RSpec suite
        run: bundle exec rspec
