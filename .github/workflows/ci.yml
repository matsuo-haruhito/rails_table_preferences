name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: RSpec and JavaScript syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run RSpec
        run: bundle exec rspec

      - name: Check JavaScript syntax
        run: node --check app/javascript/controllers/rails_table_preferences_controller.js
