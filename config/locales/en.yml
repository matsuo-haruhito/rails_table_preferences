en:
  rails_table_preferences:
    resource_table:
      empty: No records to display
      all_columns_hidden: All columns are hidden. Use Show all columns in the table preferences editor to restore them.
    editor:
      preset_select: Saved presets
      preset_select_hint: Choose which saved settings to load. Scope labels such as [shared], [role], and [organization] identify where a saved preset applies; * marks the default preset. On first run, or when no saved presets exist yet, the selector shows only the current preset name; that does not mean a saved preset already exists. If the preset list cannot load, only the current preset name remains; check the connection and reload the page.
      preset: Preset
      preset_name_hint: Enter the preset name used when saving or saving as new.
      default_preset: Use as default
      default_preset_hint: Saving or saving as new registers this preset as the default.
      apply: Apply
      apply_context: Apply to the current table view
      save: Save
      save_context: Save to the current preset name
      save_as_new: Save as new
      save_as_new_context: Save as a new preset name
      action_hint: Apply updates the current view, Save writes to the current preset name, and Save as new creates a new preset name.
      delete: Delete
      delete_confirm: Delete this saved preset?
      maintenance_hint: Delete and reset strongly affect saved settings or current edits. Review the contents before running these actions.
      read_only_preset_hint: The selected saved preset cannot be overwritten directly. Check its name and scope in the saved presets list; saving will create or update a personal preset.
      primary_action_group: Actions that apply changes to the view
      save_action_group: Actions that save settings
      maintenance_action_group: Actions that delete saved settings or reset to defaults
      visibility_bulk_action_group: Actions that update column visibility in bulk
      visibility_bulk_hint: Show all and hide all toggle every column visibility checkbox, including rows temporarily hidden by column search. Apply or save to use the changes. These actions do not toggle only search results or columns by group.
      visibility_bulk_hidden_status: All columns are hidden. Use Show all columns to restore them.
      visibility_bulk_shown_status: All columns are visible again.
      show_all_columns: Show all columns
      hide_all_columns: Hide all columns
      show_all_columns_hint: Show only hidden columns again while keeping column order, widths, filters, and sorts. Saving is a separate action.
      scope_owner: owner
      scope_shared: shared
      scope_role: role
      scope_organization: organization
      status_region: Save status
      loading_status: Loading saved settings...
      loaded_status: Saved settings loaded.
      loading_failed_status: Could not finish loading saved settings. Check the connection and reload the page.
      saving_status: Saving settings...
      saved_status: Settings saved.
      saving_failed_status: Could not finish saving settings.
      saving_as_new_status: Saving new settings...
      saved_as_new_status: New settings saved.
      saving_as_new_failed_status: Could not finish saving the new preset.
      deleting_status: Deleting saved settings...
      deleted_status: Saved settings deleted.
      deleting_failed_status: Could not finish deleting the saved preset.
      operation_failed_status: Could not complete the table preference action.
      reset_status: Table defaults restored.
      reset: Reset to table defaults
      reset_hint: Discard unsaved display changes and return to the table's default column settings, not the loaded preset.
      reset_visible_hint: Resetting returns to the table defaults and discards unsaved changes. It does not roll back to the loaded preset.
      order: Order
      width: Width
      truncate: Truncate
      drag_to_reorder: Drag to reorder
      search_columns: Search columns
      search_columns_placeholder: Filter by column name
      no_search_results: No matching columns. Change the search term and try again.
      move_up: Move up
      move_down: Move down
      resize_column: Resize column
      resize_auto_fit_status: Column width auto-fitted.
      filter: Filter
      filter_operator: Operator
      filter_operator_labels:
        contains: Contains
        not_contains: Does not contain
        equals: Equals
        not_equals: Does not equal
        starts_with: Starts with
        ends_with: Ends with
        in: Any of
        not_in: Not in
        gt: Greater than
        gteq: Greater than or equal to
        lt: Less than
        lteq: Less than or equal to
        between: Between
        blank: Blank
        present: Present
        "true": Yes
        "false": No
      filter_value: Value
      select_filter_option_search_label: Filter options
      select_filter_option_search_placeholder: Search option names
      filter_from: From
      filter_to: To
      filter_clear: Clear
      sort_asc: Sort ascending
      sort_desc: Sort descending
      sort_clear: Clear sort
