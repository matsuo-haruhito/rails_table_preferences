<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rails Table Preferences editor and scoped preset overview</title>
  <desc id="desc">A representative documentation image showing the bundled editor, scoped preset choices, and a compact table preview.</desc>
  <rect width="1400" height="920" fill="#F4F7FB"/>
  <rect x="72" y="56" width="1256" height="88" rx="22" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="102" fill="#162033" font-family="Arial, sans-serif" font-size="28" font-weight="700">Editor and scoped preset flow</text>
  <text x="108" y="126" fill="#58637A" font-family="Arial, sans-serif" font-size="16">A quick visual reference for how the bundled editor, preset scope, and working table stay connected.</text>

  <rect x="72" y="176" width="456" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Bundled editor surface</text>
  <text x="108" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">The default editor stays small, but still exposes the main table settings users need to review.</text>

  <rect x="108" y="292" width="384" height="116" rx="18" fill="#FBFCFE" stroke="#D9E2F0"/>
  <text x="132" y="326" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Preset</text>
  <rect x="132" y="344" width="232" height="40" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="152" y="369" fill="#162033" font-family="Arial, sans-serif" font-size="16">operations-default</text>
  <rect x="376" y="344" width="92" height="40" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="401" y="369" fill="#4338CA" font-family="Arial, sans-serif" font-size="15" font-weight="700">Role</text>

  <rect x="108" y="428" width="384" height="122" rx="18" fill="#FFFFFF" stroke="#D9E2F0"/>
  <text x="132" y="462" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Available presets</text>
  <rect x="132" y="482" width="168" height="34" rx="17" fill="#E8F0FF"/>
  <text x="154" y="504" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="14" font-weight="700">Owner: My compact view</text>
  <rect x="310" y="482" width="158" height="34" rx="17" fill="#ECFDF3"/>
  <text x="334" y="504" fill="#166534" font-family="Arial, sans-serif" font-size="14" font-weight="700">Shared: Team default</text>
  <rect x="132" y="524" width="176" height="34" rx="17" fill="#EEF2FF"/>
  <text x="156" y="546" fill="#4338CA" font-family="Arial, sans-serif" font-size="14" font-weight="700">Role: Operations default</text>

  <rect x="108" y="570" width="384" height="108" rx="18" fill="#FBFCFE" stroke="#D9E2F0"/>
  <text x="132" y="604" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Visible controls</text>
  <text x="132" y="634" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- visible column toggles</text>
  <text x="132" y="662" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- order and width controls</text>
  <text x="300" y="634" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- default preset checkbox</text>
  <text x="300" y="662" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- save, save as new, delete</text>

  <rect x="108" y="698" width="384" height="110" rx="18" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="132" y="732" fill="#9A3412" font-family="Arial, sans-serif" font-size="17" font-weight="700">Why this matters</text>
  <text x="132" y="762" fill="#7C3A16" font-family="Arial, sans-serif" font-size="15">The overview can mention scoped presets without implying a full admin workflow.</text>
  <text x="132" y="790" fill="#7C3A16" font-family="Arial, sans-serif" font-size="15">It stays focused on the user-facing editor and the host app remains responsible for policy.</text>

  <rect x="560" y="176" width="768" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="596" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Representative list screen</text>
  <text x="596" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">A compact table preview keeps the chosen preset tied to a believable business screen.</text>

  <rect x="596" y="292" width="696" height="176" rx="20" fill="#F8FAFC" stroke="#D9E2F0"/>
  <text x="624" y="326" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Editor snapshot</text>
  <rect x="624" y="344" width="168" height="34" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="642" y="366" fill="#162033" font-family="Arial, sans-serif" font-size="14">operations-default</text>
  <rect x="804" y="344" width="94" height="34" rx="10" fill="#EEF2FF" stroke="#C7D2FE"/>
