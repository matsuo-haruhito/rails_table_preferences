  <rect x="596" y="780" width="696" height="28" rx="14" fill="#E8F0FF"/>
  <text x="620" y="799" fill="#35517A" font-family="Arial, sans-serif" font-size="14">Preset context stays visible while the table preview shows the same working state a real host screen would expose.</text>
</svg>
