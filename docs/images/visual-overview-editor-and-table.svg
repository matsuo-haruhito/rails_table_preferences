  <rect x="918" y="344" width="126" height="34" rx="10" fill="#ECFDF3" stroke="#BBF7D0"/>
  <text x="946" y="366" fill="#166534" font-family="Arial, sans-serif" font-size="14" font-weight="700">Default preset</text>
