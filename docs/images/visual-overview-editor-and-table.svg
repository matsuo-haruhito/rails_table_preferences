  <text x="888" y="394" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">order no.</text>
  <rect x="72" y="474" width="1256" height="374" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="524" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Orders table preview</text>
  <text x="108" y="552" fill="#58637A" font-family="Arial, sans-serif" font-size="16">The demo table lets readers verify the sticky first column and understand how preferences affect the layout.</text>
  <rect x="108" y="586" width="170" height="38" rx="19" fill="#EEF2FF"/>
