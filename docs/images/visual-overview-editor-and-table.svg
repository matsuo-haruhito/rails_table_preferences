<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rails Table Preferences demo-aligned editor, scoped preset, and export preview overview</title>
  <desc id="desc">A representative documentation image showing the bundled editor, the seeded shared preset path, scoped preset orientation, and the list-screen cues that lead into export payload preview verification.</desc>
  <rect width="1400" height="920" fill="#F4F7FB"/>
  <rect x="72" y="56" width="1256" height="88" rx="22" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="102" fill="#162033" font-family="Arial, sans-serif" font-size="28" font-weight="700">Editor and shared preset flow</text>
  <text x="108" y="126" fill="#58637A" font-family="Arial, sans-serif" font-size="16">A lightweight overview that follows the current generated demo: Japanese labels, a seeded shared preset, scoped preset cues, and practical list-screen guidance.</text>

  <rect x="72" y="176" width="456" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Bundled editor surface</text>
  <text x="108" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">The default editor stays small, but still exposes the main table settings users need to review.</text>

  <rect x="108" y="292" width="384" height="116" rx="18" fill="#FBFCFE" stroke="#D9E2F0"/>
  <text x="132" y="326" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">現在の設定</text>
  <rect x="132" y="344" width="188" height="40" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="156" y="369" fill="#162033" font-family="Arial, sans-serif" font-size="16">共有ビュー</text>
  <rect x="332" y="344" width="136" height="40" rx="12" fill="#ECFDF3" stroke="#BBF7D0"/>
  <text x="364" y="369" fill="#166534" font-family="Arial, sans-serif" font-size="15" font-weight="700">[shared]</text>

  <rect x="108" y="428" width="384" height="138" rx="18" fill="#FFFFFF" stroke="#D9E2F0"/>
  <text x="132" y="462" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Preset context</text>
  <rect x="132" y="482" width="152" height="34" rx="17" fill="#E8F0FF"/>
  <text x="158" y="504" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="14" font-weight="700">個人: default</text>
  <rect x="296" y="482" width="172" height="34" rx="17" fill="#ECFDF3"/>
  <text x="324" y="504" fill="#166534" font-family="Arial, sans-serif" font-size="14" font-weight="700">共有: 共有ビュー</text>
  <text x="132" y="544" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">通常の editor から shared preset を読み込み、保存時は owner preset fallback で扱えます。</text>

  <rect x="108" y="586" width="384" height="108" rx="18" fill="#FBFCFE" stroke="#D9E2F0"/>
  <text x="132" y="620" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Visible controls</text>
  <text x="132" y="650" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- 表示 / 順序 / 列幅の編集</text>
  <text x="132" y="678" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- Save / Save as new / Delete / Reset</text>
  <text x="300" y="650" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- status region と busy-state</text>
  <text x="300" y="678" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- hidden search params</text>

  <rect x="108" y="714" width="384" height="94" rx="18" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="132" y="748" fill="#9A3412" font-family="Arial, sans-serif" font-size="17" font-weight="700">Why this matters</text>
  <text x="132" y="778" fill="#7C3A16" font-family="Arial, sans-serif" font-size="15">The generated demo now leads with shared/scoped preset orientation and practical list-screen cues.</text>
  <text x="132" y="800" fill="#7C3A16" font-family="Arial, sans-serif" font-size="15">Keeping the overview close to that surface makes the later export-preview checks easier to place.</text>

  <rect x="560" y="176" width="768" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="596" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Generated demo-aligned list screen</text>
  <text x="596" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">The preset choice, search form, and table preview stay tied to one believable business screen.</text>

  <rect x="596" y="292" width="696" height="190" rx="20" fill="#F8FAFC" stroke="#D9E2F0"/>
