  <rect x="1092" y="500" width="200" height="52" rx="12" fill="#EDF2F7"/>
  <text x="622" y="532" fill="#312E81" font-family="Arial, sans-serif" font-size="16" font-weight="700">Order</text>
  <text x="792" y="532" fill="#283548" font-family="Arial, sans-serif" font-size="16" font-weight="700">Customer</text>
  <text x="990" y="532" fill="#283548" font-family="Arial, sans-serif" font-size="16" font-weight="700">Status</text>
  <text x="1164" y="532" fill="#283548" font-family="Arial, sans-serif" font-size="16" font-weight="700">Updated</text>

  <rect x="596" y="566" width="696" height="62" rx="12" fill="#FFFFFF"/>
  <rect x="596" y="634" width="696" height="62" rx="12" fill="#F9FBFD"/>
  <rect x="596" y="702" width="696" height="62" rx="12" fill="#FFFFFF"/>
  <rect x="596" y="566" width="120" height="62" rx="12" fill="#EEF2FF"/>
  <rect x="596" y="634" width="120" height="62" rx="12" fill="#EEF2FF"/>
  <rect x="596" y="702" width="120" height="62" rx="12" fill="#EEF2FF"/>
