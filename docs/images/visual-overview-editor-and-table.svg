  <rect x="772" y="396" width="136" height="40" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="920" y="396" width="136" height="40" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="1068" y="396" width="120" height="40" rx="12" fill="#DBEAFE"/>
  <text x="649" y="420" fill="#4D5B71" font-family="Arial, sans-serif" font-size="14">Order width</text>
  <text x="803" y="420" fill="#4D5B71" font-family="Arial, sans-serif" font-size="14">Customer visible</text>
  <text x="958" y="420" fill="#4D5B71" font-family="Arial, sans-serif" font-size="14">Status position</text>
  <text x="1100" y="420" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="14" font-weight="700">Save</text>

  <rect x="596" y="500" width="120" height="52" rx="12" fill="#E0E7FF"/>
