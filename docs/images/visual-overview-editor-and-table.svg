<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rails Table Preferences visual overview</title>
  <desc id="desc">A representative documentation image showing the preset editor above a table with pinned columns.</desc>
  <rect width="1400" height="920" fill="#F5F7FB"/>
  <rect x="72" y="56" width="1256" height="72" rx="20" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="101" fill="#162033" font-family="Arial, sans-serif" font-size="28" font-weight="700">Rails Table Preferences</text>
  <text x="108" y="123" fill="#58637A" font-family="Arial, sans-serif" font-size="16">Representative demo screen for presets, widths, order, and pinned columns</text>
  <rect x="72" y="160" width="1256" height="278" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="210" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Preference editor</text>
  <text x="108" y="238" fill="#58637A" font-family="Arial, sans-serif" font-size="16">Users can switch presets, tune visible columns, and save a shared default.</text>
  <rect x="108" y="270" width="280" height="56" rx="14" fill="#F8FAFC" stroke="#CDD6E4"/>
  <text x="130" y="304" fill="#283548" font-family="Arial, sans-serif" font-size="18" font-weight="700">Preset</text>
  <text x="216" y="304" fill="#4D5B71" font-family="Arial, sans-serif" font-size="18">Ops morning review</text>
  <rect x="410" y="270" width="136" height="56" rx="14" fill="#1D4ED8"/>
  <text x="452" y="304" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Save</text>
  <rect x="562" y="270" width="168" height="56" rx="14" fill="#E6EEF9"/>
  <text x="594" y="304" fill="#1E3A8A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Save as new</text>
  <rect x="748" y="270" width="174" height="56" rx="14" fill="#ECFDF3" stroke="#B7E6CA"/>
  <text x="776" y="304" fill="#166534" font-family="Arial, sans-serif" font-size="17" font-weight="700">Shared default on</text>
  <rect x="108" y="352" width="574" height="54" rx="14" fill="#EFF6FF" stroke="#C8DAFF"/>
  <text x="132" y="386" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="17" font-weight="700">Status</text>
  <text x="206" y="386" fill="#35517A" font-family="Arial, sans-serif" font-size="17">Saved for the current account. Width and order updates are preserved.</text>
  <rect x="720" y="270" width="572" height="136" rx="18" fill="#FBFCFE" stroke="#D9E2F0"/>
  <text x="748" y="304" fill="#283548" font-family="Arial, sans-serif" font-size="18" font-weight="700">Visible columns</text>
  <rect x="748" y="326" width="150" height="34" rx="17" fill="#DBEAFE"/>
  <text x="784" y="348" fill="#1E3A8A" font-family="Arial, sans-serif" font-size="15" font-weight="700">order no.</text>
  <rect x="910" y="326" width="124" height="34" rx="17" fill="#DBEAFE"/>
  <text x="948" y="348" fill="#1E3A8A" font-family="Arial, sans-serif" font-size="15" font-weight="700">status</text>
  <rect x="1046" y="326" width="136" height="34" rx="17" fill="#DBEAFE"/>
  <text x="1083" y="348" fill="#1E3A8A" font-family="Arial, sans-serif" font-size="15" font-weight="700">assignee</text>
