  <text x="748" y="604" fill="#283548" font-family="Arial, sans-serif" font-size="15">Acme Supply</text>
  <text x="990" y="604" fill="#166534" font-family="Arial, sans-serif" font-size="15" font-weight="700">Packed</text>
  <text x="1164" y="604" fill="#283548" font-family="Arial, sans-serif" font-size="15">05-20 09:14</text>
  <text x="622" y="672" fill="#312E81" font-family="Arial, sans-serif" font-size="15" font-weight="700">SO-2041</text>
  <text x="748" y="672" fill="#283548" font-family="Arial, sans-serif" font-size="15">Northwind Labs</text>
