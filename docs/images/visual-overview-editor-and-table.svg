  <text x="1164" y="672" fill="#283548" font-family="Arial, sans-serif" font-size="15">05-19 17:42</text>
  <text x="622" y="740" fill="#312E81" font-family="Arial, sans-serif" font-size="15" font-weight="700">SO-2033</text>
  <text x="748" y="740" fill="#283548" font-family="Arial, sans-serif" font-size="15">Kanto Medical</text>
  <text x="990" y="740" fill="#166534" font-family="Arial, sans-serif" font-size="15" font-weight="700">Packed</text>
