<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rails Table Preferences filter and pinned column overview</title>
  <desc id="desc">A representative documentation image showing active filters, sorting, and pinned column context.</desc>
  <rect width="1400" height="920" fill="#F5F7FB"/>
  <rect x="72" y="56" width="1256" height="88" rx="22" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="102" fill="#162033" font-family="Arial, sans-serif" font-size="28" font-weight="700">Filter, sort, and pinned-column context</text>
  <text x="108" y="126" fill="#58637A" font-family="Arial, sans-serif" font-size="16">A representative state that shows the kind of context the demo screen exposes for reviewers.</text>
  <rect x="72" y="176" width="364" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Active state summary</text>
  <text x="108" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">Compact callouts make it easier to see which behaviors the gem controls.</text>
  <rect x="108" y="292" width="292" height="88" rx="18" fill="#EFF6FF" stroke="#C8DAFF"/>
  <text x="132" y="326" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="17" font-weight="700">Active filters</text>
  <text x="132" y="353" fill="#35517A" font-family="Arial, sans-serif" font-size="16">status: waiting, packed</text>
  <text x="132" y="374" fill="#35517A" font-family="Arial, sans-serif" font-size="16">region: Kanto</text>
  <rect x="108" y="398" width="292" height="88" rx="18" fill="#EEF2FF" stroke="#D7D9FF"/>
  <text x="132" y="432" fill="#4338CA" font-family="Arial, sans-serif" font-size="17" font-weight="700">Active sort</text>
  <text x="132" y="459" fill="#4E4AA8" font-family="Arial, sans-serif" font-size="16">updated_at desc</text>
  <text x="132" y="480" fill="#4E4AA8" font-family="Arial, sans-serif" font-size="16">secondary: status asc</text>
  <rect x="108" y="504" width="292" height="88" rx="18" fill="#ECFDF3" stroke="#B7E6CA"/>
  <text x="132" y="538" fill="#166534" font-family="Arial, sans-serif" font-size="17" font-weight="700">Pinned columns</text>
  <text x="132" y="565" fill="#246B46" font-family="Arial, sans-serif" font-size="16">left: order no.</text>
  <text x="132" y="586" fill="#246B46" font-family="Arial, sans-serif" font-size="16">right: updated at</text>
  <rect x="108" y="610" width="292" height="176" rx="18" fill="#FBFCFE" stroke="#D9E2F0"/>
  <text x="132" y="644" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">What this verifies</text>
  <text x="132" y="680" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">• Preset selection preserves multiple dimensions of table state.</text>
  <text x="132" y="712" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">• Sticky columns still read correctly when horizontal space gets tight.</text>
  <text x="132" y="744" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">• Reviewers can compare labels and messages without running the app first.</text>
  <rect x="472" y="176" width="856" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="508" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Demo table state</text>
  <text x="508" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">The pinned first and last columns frame the filtered rows and preserve orientation while scanning.</text>
  <rect x="508" y="290" width="170" height="38" rx="19" fill="#EFF6FF"/>
  <text x="540" y="315" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="15" font-weight="700">Filter: Kanto</text>
  <rect x="694" y="290" width="178" height="38" rx="19" fill="#EFF6FF"/>
  <text x="724" y="315" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="15" font-weight="700">Status: waiting, packed</text>
