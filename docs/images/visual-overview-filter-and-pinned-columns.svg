  <text x="536" y="764" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Reading notes</text>
  <text x="536" y="791" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">Pinned columns stay visually distinct, while the central columns continue to show the filtered working set.</text>
