  <rect x="508" y="780" width="784" height="28" rx="14" fill="#E8F0FF"/>
  <text x="532" y="799" fill="#35517A" font-family="Arial, sans-serif" font-size="14">Grouped headers and a fixed lead column can appear in the overview without changing the host application's ownership of final table markup.</text>
