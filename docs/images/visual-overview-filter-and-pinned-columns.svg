<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rails Table Preferences grouped header and fixed column overview</title>
  <desc id="desc">A representative documentation image showing grouped headers, a fixed leading column, and active filter and sort context.</desc>
  <rect width="1400" height="920" fill="#F5F7FB"/>
  <rect x="72" y="56" width="1256" height="88" rx="22" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="102" fill="#162033" font-family="Arial, sans-serif" font-size="28" font-weight="700">Grouped headers and fixed-column context</text>
  <text x="108" y="126" fill="#58637A" font-family="Arial, sans-serif" font-size="16">The host app owns the final table markup, while the gem still preserves the metadata and working-state context.</text>

  <rect x="72" y="176" width="364" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">What the view conveys</text>
  <text x="108" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">The overview stays at documentation level and leaves detailed policy in the focused guides.</text>

  <rect x="108" y="292" width="292" height="88" rx="18" fill="#EEF2FF" stroke="#D7D9FF"/>
  <text x="132" y="326" fill="#4338CA" font-family="Arial, sans-serif" font-size="17" font-weight="700">Grouped headers</text>
  <text x="132" y="353" fill="#4E4AA8" font-family="Arial, sans-serif" font-size="16">Customer</text>
  <text x="132" y="374" fill="#4E4AA8" font-family="Arial, sans-serif" font-size="16">Delivery</text>

  <rect x="108" y="398" width="292" height="88" rx="18" fill="#ECFDF3" stroke="#B7E6CA"/>
  <text x="132" y="432" fill="#166534" font-family="Arial, sans-serif" font-size="17" font-weight="700">Fixed column</text>
  <text x="132" y="459" fill="#246B46" font-family="Arial, sans-serif" font-size="16">Order number stays pinned</text>
  <text x="132" y="480" fill="#246B46" font-family="Arial, sans-serif" font-size="16">while the rest scrolls</text>

  <rect x="108" y="504" width="292" height="88" rx="18" fill="#EFF6FF" stroke="#C8DAFF"/>
  <text x="132" y="538" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="17" font-weight="700">Active state</text>
  <text x="132" y="565" fill="#35517A" font-family="Arial, sans-serif" font-size="16">Filter: Kanto</text>
  <text x="132" y="586" fill="#35517A" font-family="Arial, sans-serif" font-size="16">Sort: updated desc</text>

  <rect x="108" y="610" width="292" height="176" rx="18" fill="#FBFCFE" stroke="#D9E2F0"/>
  <text x="132" y="644" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Reading notes</text>
  <text x="132" y="680" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- Group labels come from host-app header markup.</text>
  <text x="132" y="712" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- The pinned first column preserves orientation.</text>
  <text x="132" y="744" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- Filter and sort state still read as one coherent list screen.</text>

  <rect x="472" y="176" width="856" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="508" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Representative table state</text>
  <text x="508" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">Grouped customer and delivery headers sit above the same column metadata the bundled editor stores.</text>

  <rect x="508" y="290" width="170" height="38" rx="19" fill="#EFF6FF"/>
  <text x="540" y="315" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="15" font-weight="700">Filter: Kanto</text>
  <rect x="694" y="290" width="174" height="38" rx="19" fill="#EEF2FF"/>
  <text x="726" y="315" fill="#4338CA" font-family="Arial, sans-serif" font-size="15" font-weight="700">Sort: updated desc</text>
  <rect x="884" y="290" width="192" height="38" rx="19" fill="#ECFDF3"/>
  <text x="914" y="315" fill="#166534" font-family="Arial, sans-serif" font-size="15" font-weight="700">Fixed column: Order</text>

