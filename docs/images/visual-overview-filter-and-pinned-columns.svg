<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rails Table Preferences demo-aligned grouped header and fixed column overview</title>
  <desc id="desc">A representative documentation image showing grouped headers, a fixed leading order column, a visible separator after the fixed column, and the same Japanese search and sort cues used in the generated demo.</desc>
  <rect width="1400" height="920" fill="#F5F7FB"/>
  <rect x="72" y="56" width="1256" height="88" rx="22" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="102" fill="#162033" font-family="Arial, sans-serif" font-size="28" font-weight="700">Grouped headers and fixed-column context</text>
  <text x="108" y="126" fill="#58637A" font-family="Arial, sans-serif" font-size="16">This companion view keeps the docs-level grouped and pinned story, but uses the same Japanese list-screen cues as the generated demo.</text>

  <rect x="72" y="176" width="364" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="108" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">What the view conveys</text>
  <text x="108" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">The overview stays lightweight while still matching the vocabulary and sample rows used elsewhere in the docs.</text>

  <rect x="108" y="292" width="292" height="88" rx="18" fill="#EEF2FF" stroke="#D7D9FF"/>
  <text x="132" y="326" fill="#4338CA" font-family="Arial, sans-serif" font-size="17" font-weight="700">検索と並び順</text>
  <text x="132" y="353" fill="#4E4AA8" font-family="Arial, sans-serif" font-size="16">検索語: 東京</text>
  <text x="132" y="374" fill="#4E4AA8" font-family="Arial, sans-serif" font-size="16">納品日: 昇順</text>

  <rect x="108" y="398" width="292" height="88" rx="18" fill="#ECFDF3" stroke="#B7E6CA"/>
  <text x="132" y="432" fill="#166534" font-family="Arial, sans-serif" font-size="17" font-weight="700">固定列</text>
  <text x="132" y="459" fill="#246B46" font-family="Arial, sans-serif" font-size="16">受注番号を固定して</text>
  <text x="132" y="480" fill="#246B46" font-family="Arial, sans-serif" font-size="16">横スクロール時の向きを保つ</text>

  <rect x="108" y="504" width="292" height="88" rx="18" fill="#EFF6FF" stroke="#C8DAFF"/>
  <text x="132" y="538" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="17" font-weight="700">グループ見出し</text>
  <text x="132" y="565" fill="#35517A" font-family="Arial, sans-serif" font-size="16">得意先情報</text>
  <text x="132" y="586" fill="#35517A" font-family="Arial, sans-serif" font-size="16">配送情報</text>

  <rect x="108" y="610" width="292" height="176" rx="18" fill="#FBFCFE" stroke="#D9E2F0"/>
  <text x="132" y="644" fill="#283548" font-family="Arial, sans-serif" font-size="17" font-weight="700">Reading notes</text>
  <text x="132" y="680" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- Group labels still come from host-app header markup.</text>
  <text x="132" y="712" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- The pinned first column preserves orientation.</text>
  <text x="132" y="744" fill="#4D5B71" font-family="Arial, sans-serif" font-size="15">- The separator marks where host apps may add final polish.</text>

  <rect x="472" y="176" width="856" height="664" rx="24" fill="#FFFFFF" stroke="#D6DEEB"/>
  <text x="508" y="226" fill="#162033" font-family="Arial, sans-serif" font-size="24" font-weight="700">Representative table state</text>
  <text x="508" y="254" fill="#58637A" font-family="Arial, sans-serif" font-size="16">Grouped customer and delivery headers sit above the same list-screen vocabulary used by the generated demo.</text>

  <rect x="508" y="290" width="152" height="38" rx="19" fill="#EFF6FF"/>
  <text x="538" y="315" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="15" font-weight="700">検索: 東京</text>
